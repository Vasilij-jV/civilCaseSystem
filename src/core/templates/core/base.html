<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}civilCaseSystem{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
            color: #222;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        nav {
            margin-top: 15px;
        }

        nav a {
            display: inline-block;
            margin-right: 10px;
            margin-bottom: 10px;
            padding: 10px 14px;
            background-color: #34495e;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        nav a:hover {
            background-color: #1f2d3a;
        }

        main {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            margin-top: 0;
            font-size: 20px;
        }

        .card p {
            margin-bottom: 0;
            line-height: 1.5;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
<header>
    <h1>civilCaseSystem</h1>
    <nav>
        <a href="/">Главная</a>
        <a href="#">Документы</a>
        <a href="#">Доказательства</a>
        <a href="#">Правовые нормы</a>
        <a href="#">Замечания суда</a>
        <a href="#">Версии иска</a>
        <a href="#">Хронология</a>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    Локальная система систематизации гражданского дела
</footer>
</body>
</html>
